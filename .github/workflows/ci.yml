name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # Unit suites use FakePage — no real browser needed, so skip the Chromium download.
      - run: bun install --ignore-scripts
      - run: bun run typecheck
      - run: bun run studio:webcheck
      - run: bun run lint
      - run: bun test
